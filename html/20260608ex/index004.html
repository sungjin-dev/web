<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST</title>
</head>
<body>
    <!-- 목록 관련 태그 -->
    <!-- 순서 없는 목록 -->
     <h2>메뉴판</h2>
     <ul>  
        <li> 자장면 7,000</li>   
        <li> 짬뽕 8,000</li>
        <li> 간짜장 9,000</li>
        <li> 볶음밥 9,500</li>
     </ul>
    <!-- 순서 있는 목록 -->
    <!-- 목적: '순서(Order)'가 절대적으로 중요한 목록 -->
     <h2>메뉴판</h2>
    <ol type="A">
        <li>자장면 7,000</li>   
        <li>짬뽕 8,000</li>
        <li>간짜장 9,000</li>
        <li>볶음밥 9,500</li>
    </ol>

    <!-- 설명 목록 -->
    <!-- "영어 사전"이나 "Q&A" <dt>(단어/질문)와 <dd>(설명/답변)-->
    <dl>
        <dt>오전 메뉴판</dt>
        <dd>자장면 7,000</dd>
        <dd>짬뽕 8,000</dd>
        <dd>간짜장 9,000</dd>
        <dd>볶음밥 9,500</dd>

        <dt>오후 메뉴판</dt>
        <dd>탕수육 7,000</dd>
        <dd>양장피 8,000</dd>
        <dd>유린기 9,000</dd>
        <dd>술 9,500</dd>
    </dl>


</body>
</html>
