<!DOCTYPE html>
<!--HTML 버전을 설정한다. 우리는 HTML5를 사용한다-->
<html lang="en">
   
<head>     
    <meta charset="UTF-8"> 
    <!-- 웹문서가 출력될 때 사용되는 인코딩을 설정한다. 대부분 현재웹에서는 UTF-8을 사용한다 -->
     <!-- 닫을 필요가 없는 빈 태크가 있음 ex)<img>, <br>, <hr>, <input>-->
    <title>MYHOME</title>
    <!-- 웹문서의 제목을 출력한다. -->
</head>
<!-- 웹문서의 설정 정보를 코딩한다 -->
<body>   
    this is index001 page. 
    
</body>
<!-- 웹문서에서 화면에 출력(렌더링)되는 정보를 코딩한다 -->
</html>
<!-- </html> 태그는 웹문서의 끝을 나타낸다 -->
