<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POSITION</title>

    <style>
        div {
            width: 300px;
            height: 100px;
            text-align: center;
        }

        div.redbox {
            background-color: red;
            position:fixed;
            top: 0;
            left: 0;
        }
        div.greenbox {
            background-color: green;
            position: relative;
            top: 500px;
            left: 200px;
        }
        div.bluebox {
            background-color: blue;
            position: absolute;
            top: 500px;
            left: 700px;
        }
/* 왼쪽 상단 모서리가 기준이라 상하좌우 반전  static 기본값 */

    </style>

</head>
<body>
    <div class="redbox">첫 번째 요소</div>
